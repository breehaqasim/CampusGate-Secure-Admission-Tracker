server {
    # ZAP 10036: do not expose nginx version in Server header or error pages.
    server_tokens off;

    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Include security headers inside each location: nginx only inherits server-level add_header
    # when a location defines zero add_header directives; including here guarantees CSP + COEP
    # on HTML, API-less SPA routes, and static assets.
    location / {
        include /etc/nginx/nginx-csp.inc;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/nginx-csp.inc;
        expires 7d;
    }
}
