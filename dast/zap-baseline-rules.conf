# ZAP baseline rule overrides (see https://www.zaproxy.org/docs/docker/baseline-scan/ )
#
# Plugin 90004 (Insufficient site isolation / COEP-COOP-CORP family): ZAP treats
# Cross-Origin-Embedder-Policy: unsafe-none as "invalid" and wants require-corp.
# require-corp requires CORP (or equivalent) on every cross-origin subresource; a
# typical Supabase + CDN SPA cannot meet that without a dedicated hardening program.
# We intentionally send COEP: unsafe-none from nginx (see nginx-csp.inc) and ignore
# this passive advisory in CI so DAST reflects exploitable issues, not Spectre-only headers.
90004	IGNORE	(COEP unsafe-none is intentional; require-corp incompatible with current stack.)
