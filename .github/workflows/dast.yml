name: DAST — OWASP ZAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (same pattern as SCA)
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_SUPABASE_URL=https://placeholder.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=placeholder-for-ci-dast-only \
            -t campusgate:dast .

      - name: Run app container (nginx on host port 8080)
        run: |
          set -euo pipefail
          docker run -d --name campusgate-dast -p 8080:80 campusgate:dast

      - name: Wait until app is reachable
        run: |
          set -euo pipefail
          TARGET="http://127.0.0.1:8080/"
          echo "Waiting for ${TARGET} ..."
          for i in $(seq 1 60); do
            if curl -sf --max-time 3 "${TARGET}" >/dev/null; then
              echo "App is reachable after ${i} attempt(s)."
              {
                echo "## DAST prep (step 2)"
                echo ""
                echo "- Target: \`${TARGET}\`"
                echo "- Container: \`campusgate-dast\`"
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            sleep 2
          done
          echo "Timeout: app did not become reachable in time."
          docker logs campusgate-dast || true
          exit 1

      - name: OWASP ZAP Baseline Scan
        run: |
          set -euo pipefail
          mkdir -p dast-reports
          # --network host: ZAP container can reach nginx on the runner at 127.0.0.1:8080
          set +e
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}/dast-reports:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://127.0.0.1:8080/ \
              -J report.json \
              -r report.html
          ZAP_EXIT=$?
          set -e
          echo "ZAP baseline exit code: ${ZAP_EXIT}"
          # 0–2 = scan finished (pass / warn / rule failures). 3 = ZAP/tool error — fail here.
          if [ "${ZAP_EXIT}" -eq 3 ]; then
            echo "ZAP baseline failed with a fatal error (check target URL and logs)."
            exit 1
          fi
          {
            echo ""
            echo "## DAST — ZAP (step 3)"
            echo ""
            echo "- ZAP baseline exit code: \`${ZAP_EXIT}\` (0=pass, 1=warnings, 2=fail per ZAP rules — quality gate comes in step 4)"
            echo "- Reports: \`dast-reports/report.html\`, \`dast-reports/report.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload DAST reports (ZAP)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-reports
          path: dast-reports/
          if-no-files-found: warn

      - name: Stop app container
        if: always()
        run: |
          docker stop campusgate-dast 2>/dev/null || true
