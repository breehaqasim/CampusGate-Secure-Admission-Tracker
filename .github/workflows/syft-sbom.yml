name: SCA — SBOM + Vulnerability Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # nightly scan (UTC)

permissions:
  contents: read

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft + Grype
        run: |
          set -euo pipefail
          # Install the latest releases to avoid stale scanner-runtime CVEs.
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          syft version
          grype version

      - name: SBOM — source (CycloneDX JSON)
        run: |
          set -euo pipefail
          syft dir:. -o cyclonedx-json > sbom.json
          # Remove scanner self-metadata so source scan reflects project components only.
          jq 'del(.metadata.tools)' sbom.json > sbom.source.cleaned.json
          mv sbom.source.cleaned.json sbom.json

      - name: Docker build
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_SUPABASE_URL=https://placeholder.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=placeholder-for-ci-sbom-only \
            -t campusgate:ci .

      - name: SBOM — image (CycloneDX JSON)
        run: |
          set -euo pipefail
          syft docker:campusgate:ci -o cyclonedx-json > sbom-dockerimage.json
          # Remove scanner self-metadata so image scan reflects image components only.
          jq 'del(.metadata.tools)' sbom-dockerimage.json > sbom.image.cleaned.json
          mv sbom.image.cleaned.json sbom-dockerimage.json

      - name: Scan vulnerabilities (JSON reports)
        run: |
          set -euo pipefail
          grype sbom:sbom.json -o json > grype-source.json
          grype sbom:sbom-dockerimage.json -o json > grype-image.json
          # Drop scanner/toolchain stdlib findings from persisted reports.
          jq '.matches |= map(select((.artifact.name // "") != "stdlib"))' grype-source.json > grype-source.filtered.json
          mv grype-source.filtered.json grype-source.json
          jq '.matches |= map(select((.artifact.name // "") != "stdlib"))' grype-image.json > grype-image.filtered.json
          mv grype-image.filtered.json grype-image.json

      - name: Gate PR/Push on High/Critical
        run: |
          set -euo pipefail
          # Exclude scanner/tooling noise from Go stdlib metadata in both scans.
          BASE_FILTER='select((.artifact.name // "") != "stdlib")'
          ACTIONABLE_FILTER='select((.vulnerability.fix.state // "") == "fixed")'

          # Raw counts (for visibility).
          SRC_HIGH=$(jq "[.matches[] | $BASE_FILTER | select(.vulnerability.severity==\"High\")] | length" grype-source.json)
          SRC_CRIT=$(jq "[.matches[] | $BASE_FILTER | select(.vulnerability.severity==\"Critical\")] | length" grype-source.json)
          IMG_HIGH=$(jq "[.matches[] | $BASE_FILTER | select(.vulnerability.severity==\"High\")] | length" grype-image.json)
          IMG_CRIT=$(jq "[.matches[] | $BASE_FILTER | select(.vulnerability.severity==\"Critical\")] | length" grype-image.json)

          # Actionable counts (fixed version exists).
          SRC_HIGH_ACTIONABLE=$(jq "[.matches[] | $BASE_FILTER | $ACTIONABLE_FILTER | select(.vulnerability.severity==\"High\")] | length" grype-source.json)
          SRC_CRIT_ACTIONABLE=$(jq "[.matches[] | $BASE_FILTER | $ACTIONABLE_FILTER | select(.vulnerability.severity==\"Critical\")] | length" grype-source.json)
          IMG_HIGH_ACTIONABLE=$(jq "[.matches[] | $BASE_FILTER | $ACTIONABLE_FILTER | select(.vulnerability.severity==\"High\")] | length" grype-image.json)
          IMG_CRIT_ACTIONABLE=$(jq "[.matches[] | $BASE_FILTER | $ACTIONABLE_FILTER | select(.vulnerability.severity==\"Critical\")] | length" grype-image.json)

          TOTAL_HIGH=$((SRC_HIGH + IMG_HIGH))
          TOTAL_CRIT=$((SRC_CRIT + IMG_CRIT))
          TOTAL_HIGH_ACTIONABLE=$((SRC_HIGH_ACTIONABLE + IMG_HIGH_ACTIONABLE))
          TOTAL_CRIT_ACTIONABLE=$((SRC_CRIT_ACTIONABLE + IMG_CRIT_ACTIONABLE))

          echo "High (all): ${TOTAL_HIGH}"
          echo "Critical (all): ${TOTAL_CRIT}"
          echo "High (actionable): ${TOTAL_HIGH_ACTIONABLE}"
          echo "Critical (actionable): ${TOTAL_CRIT_ACTIONABLE}"

          {
            echo "## SCA Summary"
            echo ""
            echo "- Source High: ${SRC_HIGH}"
            echo "- Source Critical: ${SRC_CRIT}"
            echo "- Image High: ${IMG_HIGH}"
            echo "- Image Critical: ${IMG_CRIT}"
            echo "- Total High: ${TOTAL_HIGH}"
            echo "- Total Critical: ${TOTAL_CRIT}"
            echo ""
            echo "### Actionable (fix available)"
            echo "- Source High: ${SRC_HIGH_ACTIONABLE}"
            echo "- Source Critical: ${SRC_CRIT_ACTIONABLE}"
            echo "- Image High: ${IMG_HIGH_ACTIONABLE}"
            echo "- Image Critical: ${IMG_CRIT_ACTIONABLE}"
            echo "- Total High: ${TOTAL_HIGH_ACTIONABLE}"
            echo "- Total Critical: ${TOTAL_CRIT_ACTIONABLE}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${TOTAL_HIGH_ACTIONABLE}" -gt 0 ] || [ "${TOTAL_CRIT_ACTIONABLE}" -gt 0 ]; then
            echo "SCA gate failed: actionable High/Critical vulnerabilities found."
            exit 1
          fi

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            sbom.json
            sbom-dockerimage.json
            grype-source.json
            grype-image.json